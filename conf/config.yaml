# IP única del entorno (MinIO :9000, Spark master :7077, Elasticsearch, etc.).
# Sin tocar el archivo:  $env:SEMANTIC_SEARCH_HOST="10.x.x.x"  (PowerShell)
network:
  host: "192.168.100.26"

run_date: "2026-05-15"

spark:
  master: "spark://{network.host}:7077"
  # IP del driver (opcional). null = en modo spark:// se intenta inferir la IP hacia el master.
  driver_host: null
  # Python en workers (IP distinta al driver). "python" = PATH del worker; o ruta absoluta identica en todos.
  executor_python: "python"
  app_name: "SemanticFlow"
  executor_memory: "4g"
  total_executor_cores: 6
  num_partitions: 60

paths:
  raw: "data/raw/arxiv_sample.jsonl"
  chunks: "data/features"
  predictions: "data/predictions"
  embeddings: "data/embeddings"

model:
  name: "all-MiniLM-L6-v2"
  max_tokens: 256
  overlap_tokens: 32
  min_chunk_tokens: 30
  batch_size: 32

elasticsearch:
  host: "{network.host}"
  port: 9200
  index: "documents"
  dims: 384
  use_ssl: false
  user: null
  password: null

minio:
  endpoint: "http://{network.host}:9000"
  access_key: "admin"
  secret_key: "admin12345"
  bucket: "semantic-raw"
