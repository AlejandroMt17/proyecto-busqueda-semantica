# Plantilla (manual sección 2.3). Copiar a $SPARK_HOME/conf/spark-defaults.conf
# o pasar: spark-submit --properties-file conf/spark-defaults.conf ...
#
# spark.serializer                 org.apache.spark.serializer.KryoSerializer
# spark.sql.adaptive.enabled       true
# spark.driver.memory              4g
#
# --- Workers + S3A (evita "HADOOP_HOME unset" / rutas Windows en Linux) ---
# En CADA nodo worker, en conf/spark-env.sh (Linux) ANTES de start-worker.sh:
#   export HADOOP_HOME="${SPARK_HOME}"
#   export PYSPARK_PYTHON=python   # o python3; misma orden en el PATH de cada worker
#   Evitá rutas absolutas de otra máquina (rompen executors remotos).
# Windows worker: set HADOOP_HOME=%SPARK_HOME% y coloca winutils.exe en %HADOOP_HOME%\bin
#   (https://wiki.apache.org/hadoop/WindowsProblems)
#
# Si todos los workers Linux comparten la misma ruta de Spark (ej. /opt/spark), desde el
# master Windows podés usar en run_pipeline_windows.ps1: $env:EXECUTOR_HADOOP_HOME="/opt/spark"
# Si el worker es Windows: $env:EXECUTOR_HADOOP_HOME="C:/spark" (misma ruta que SPARK_HOME en ese PC).
