run_date: "2026-05-12"

spark:
  master: "spark://10.84.18.85:7077"
  app_name: "SemanticFlow"
  executor_memory: "4g"
  total_executor_cores: 6
  num_partitions: 60

paths:
  raw: "data/raw/arxiv_sample.jsonl"
