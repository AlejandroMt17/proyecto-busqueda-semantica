services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # Apache Tika (opcional): extracción PDF/DOCX vía API. ETL usa fallback pypdf/python-docx si Tika no responde.
  tika:
    image: apache/tika:latest
    ports:
      - "9998:9998"

volumes:
  minio_data:
